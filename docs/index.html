<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CodeGuide | 程序员编码指南</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="/assets/css/vue.css">
  <link rel="stylesheet" href="assets/css/mermaid.min.css">
  <script src="assets/js/mermaid.min.js"></script>
  <script>
      var num=0;
      mermaid.initialize({ startOnLoad: false });
  </script>
</head>
<body>
<div id="app"></div>
<script>
    window.$docsify = {
      name: '美特斯',
      repo: 'https://github.com/meitesi/meitesi.github.io',
      auto2top: true,
      coverpage: true,
      loadSidebar: true,
      maxLevel: 4,
      subMaxLevel: 2,
      search: {
        paths: 'auto',
        placeholder: '🔍 Type to search ',
        noData: '😞 No Results! ',
        depth: 6
      },
      pagination: {
        previousText: 'PREVIOUS',
        nextText: 'NEXT',
        crossChapter: true
      },
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === "mermaid") {
              return (
                '<div class="mermaid">' + mermaid.render('mermaid-svg-' + num++, code) + "</div>"
              );
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    }                                 
  </script>
<script src="assets/js/docsify.min.js"></script>
<script src="assets/js/md5.js"></script>
<script src="assets/js/search.min.js"></script>
<script src="assets/js/docsify-pagination.min.js"></script>
<script src="assets/js/zoom-image.js"></script>
<script src="assets/js/prism-bash.js"></script>
<script src="assets/js/prism-java.min.js"></script>
<script src="assets/js/prism-php.min.js"></script>
<script src="assets/js/prism-go.min.js"></script>
</body>
</html>
